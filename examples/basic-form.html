<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 42rem; margin: 3rem auto; padding: 0 1rem; }
    label { display: block; margin-block: 1rem; }
    input, textarea, button { width: 100%; padding: .75rem; font: inherit; }
    .hidden { position: absolute; left: -9999px; opacity: 0; }
  </style>
</head>
<body>
  <h1>Contact us</h1>
  <form method="post" action="https://YOUR_WORKER_URL/api/submit">
    <label>
      Name
      <input name="name" autocomplete="name" />
    </label>
    <label>
      Email
      <input name="email" type="email" autocomplete="email" required />
    </label>
    <label>
      Subject
      <input name="subject" />
    </label>
    <label>
      Message
      <textarea name="message" rows="6" required></textarea>
    </label>
    <label class="hidden" aria-hidden="true" tabindex="-1">
      Leave this field empty
      <input name="_gotcha" tabindex="-1" autocomplete="off" />
    </label>
    <button type="submit">Send</button>
  </form>
</body>
</html>
